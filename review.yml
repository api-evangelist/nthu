      community-maintained public API exists: the NTHU Data API (NTHU-SA),
      version 2.0.0, built with FastAPI and serving Swagger docs at /docs plus a
      machine-readable openapi.json with 22 confirmed paths (announcements,
      buses, courses, departments, dining, energy, libraries, locations,
      newsletters). All endpoints below were probed live. The institutional
      repository host (nthur.lib.nthu.edu.tw) did not resolve over TLS during
      review and could not be confirmed as an API. No endpoints were fabricated;
      only verified URLs are recorded.
